<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Update Test</title>
<style>
  body { background:#050810; color:#c8d8f0; font-family:monospace; padding:12px; }
  h2 { color:#00d4ff; font-size:14px; margin-bottom:8px; }
  #status { color:#ffd700; font-size:11px; margin-bottom:10px; }
  #grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .card { background:#0d1525; border:1px solid #1a2540; border-radius:6px; padding:8px; }
  .sym { color:#fff; font-size:12px; font-weight:bold; }
  .price { color:#00ff88; font-size:14px; margin-top:2px; }
  .chg { font-size:10px; margin-top:1px; }
  .up { color:#00ff88; } .down { color:#ff3355; }
  .age { font-size:9px; color:#3a4f72; margin-top:2px; }
  #log { font-size:10px; margin-top:12px; max-height:150px; overflow-y:auto; }
  .lok { color:#00ff88; } .lerr { color:#ff3355; } .linfo { color:#6a82a8; }
</style>
</head>
<body>
<h2>BOOM TRADER — PRICE UPDATE TEST</h2>
<div id="status">Initializing...</div>
<div id="grid"></div>
<div id="log"></div>

<script>
const TICKERS = [
  'AMZN','NVDA','MU','ASML','TSM','AVGO','PLTR','CRWV','AAPL','MSFT',
  'GOOGL','META','TSLA','NFLX','ORCL','SMCI','RDDT','APP','CRWD',
  'QQQ','SHOP','SNOW','COIN','TD.TO','CRM','UBER','COST','WMT'
];

const prices = {};
let fetchCount = 0;
let isFetching = false;

// Build grid
document.getElementById('grid').innerHTML = TICKERS.map(sym => `
  <div class="card" id="card-${sym.replace('.','_')}">
    <div class="sym">${sym}</div>
    <div class="price" id="price-${sym.replace('.','_')}">--</div>
    <div class="chg" id="chg-${sym.replace('.','_')}">--</div>
    <div class="age" id="age-${sym.replace('.','_')}">never</div>
  </div>
`).join('');

function log(msg, cls) {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = cls || 'linfo';
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.prepend(line);
  while (el.children.length > 30) el.removeChild(el.lastChild);
}

const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

let proxyIndex = 0; // rotate which proxy is tried first

async function fetchPrice(sym, tickerIndex) {
  const bust = Date.now();
  const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=2d&timestamp=${bust}`;
  
  // Rotate starting proxy per ticker so load is spread across all proxies
  const startProxy = (proxyIndex + tickerIndex) % PROXIES.length;
  const ordered = [
    PROXIES[startProxy % PROXIES.length](yahooUrl),
    PROXIES[(startProxy + 1) % PROXIES.length](yahooUrl),
    PROXIES[(startProxy + 2) % PROXIES.length](yahooUrl),
  ];

  for (const url of ordered) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const json = await res.json();
      const meta = json?.chart?.result?.[0]?.meta;
      if (!meta?.regularMarketPrice) continue;
      return {
        price: meta.regularMarketPrice,
        prevClose: meta.chartPreviousClose ?? meta.previousClose ?? meta.regularMarketPrice
      };
    } catch(e) { continue; }
  }
  return null;
}

function updateCard(sym, data) {
  const id = sym.replace('.','_');
  const priceEl = document.getElementById(`price-${id}`);
  const chgEl = document.getElementById(`chg-${id}`);
  const ageEl = document.getElementById(`age-${id}`);
  if (!priceEl) return;

  const prev = prices[sym];
  const changed = prev && prev.price !== data.price;

  priceEl.textContent = `$${data.price.toFixed(2)}`;
  if (changed) {
    priceEl.style.color = data.price > prev.price ? '#00ff88' : '#ff3355';
    setTimeout(() => priceEl.style.color = '#00ff88', 1000);
  }

  const chg = data.prevClose ? ((data.price - data.prevClose) / data.prevClose * 100) : 0;
  const sign = chg >= 0 ? '+' : '';
  chgEl.textContent = `${sign}${chg.toFixed(2)}%`;
  chgEl.className = `chg ${chg >= 0 ? 'up' : 'down'}`;
  ageEl.textContent = new Date().toLocaleTimeString();
  prices[sym] = data;
}

async function fetchAll() {
  if (isFetching) { log('Skipped — still fetching', 'lerr'); return; }
  isFetching = true;
  fetchCount++;
  const n = fetchCount;
  const start = Date.now();
  document.getElementById('status').textContent = `Fetching #${n}...`;

  let ok = 0, fail = 0;
  const BATCH_SIZE = 7; // 7 tickers per batch across 3 proxies = ~2-3 per proxy
  
  for (let i = 0; i < TICKERS.length; i += BATCH_SIZE) {
    const batch = TICKERS.slice(i, i + BATCH_SIZE);
    await Promise.all(batch.map(async (sym, batchIdx) => {
      const data = await fetchPrice(sym, i + batchIdx);
      if (data) {
        updateCard(sym, data);
        ok++;
      } else {
        fail++;
        log(`${sym} failed`, 'lerr');
      }
    }));
    // Small pause between batches to avoid rate limiting
    if (i + BATCH_SIZE < TICKERS.length) await new Promise(r => setTimeout(r, 300));
  }

  // Rotate proxy starting point for next fetch cycle
  proxyIndex = (proxyIndex + 1) % PROXIES.length;

  const elapsed = Date.now() - start;
  isFetching = false;
  const msg = `Fetch #${n}: ${ok} ok, ${fail} failed — ${elapsed}ms`;
  document.getElementById('status').textContent = msg;
  log(msg, fail > 0 ? 'lerr' : 'lok');
}

fetchAll();
setInterval(fetchAll, 5000);
</script>
</body>
</html>
