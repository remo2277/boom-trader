<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMZN Test</title>
<style>
  body { background:#050810; color:#c8d8f0; font-family:monospace; padding:20px; }
  #log { font-size:12px; line-height:1.8; }
  .price { font-size:32px; color:#00ff88; margin:10px 0; }
  .time { color:#6a82a8; font-size:11px; }
  .err { color:#ff3355; }
  .ok { color:#00ff88; }
</style>
</head>
<body>
<div class="price" id="price">--</div>
<div class="time" id="lastUpdate">Never updated</div>
<div id="log"></div>

<script>
let fetchCount = 0;
let isFetching = false;

function log(msg, cls) {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = cls || '';
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.prepend(line);
  // Keep only last 20 lines
  while (el.children.length > 20) el.removeChild(el.lastChild);
}

async function fetchAMZN() {
  if (isFetching) {
    log('SKIPPED — still fetching', 'err');
    return;
  }
  isFetching = true;
  fetchCount++;
  const n = fetchCount;
  log(`Fetch #${n} started`);

  const url = `https://query1.finance.yahoo.com/v8/finance/chart/AMZN?interval=1d&range=5d`;
  const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;

  try {
    const start = Date.now();
    const res = await fetch(proxy);
    const elapsed = Date.now() - start;
    if (!res.ok) { log(`Fetch #${n} HTTP error ${res.status}`, 'err'); return; }
    const json = await res.json();
    const meta = json?.chart?.result?.[0]?.meta;
    const price = meta?.regularMarketPrice;
    log(`Fetch #${n} OK in ${elapsed}ms — price: $${price}`, 'ok');
    document.getElementById('price').textContent = `AMZN $${price}`;
    document.getElementById('lastUpdate').textContent = `Updated ${new Date().toLocaleTimeString()} (fetch #${n}, ${elapsed}ms)`;
  } catch(e) {
    log(`Fetch #${n} ERROR: ${e.message}`, 'err');
  } finally {
    isFetching = false;
  }
}

// Run immediately then every 5 seconds
fetchAMZN();
setInterval(fetchAMZN, 5000);
</script>
</body>
</html>
