<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMZN Test</title>
<style>
  body { background:#050810; color:#c8d8f0; font-family:monospace; padding:20px; }
  #log { font-size:12px; line-height:1.8; }
  .price { font-size:32px; color:#00ff88; margin:10px 0; }
  .time { color:#6a82a8; font-size:11px; }
  .err { color:#ff3355; }
  .ok { color:#00ff88; }
</style>
</head>
<body>
<div class="price" id="price">--</div>
<div class="time" id="lastUpdate">Never updated</div>
<div id="log"></div>

<script>
let fetchCount = 0;
let isFetching = false;

function log(msg, cls) {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = cls || '';
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.prepend(line);
  // Keep only last 20 lines
  while (el.children.length > 20) el.removeChild(el.lastChild);
}

async function fetchAMZN() {
  if (isFetching) {
    log('SKIPPED — still fetching', 'err');
    return;
  }
  isFetching = true;
  fetchCount++;
  const n = fetchCount;
  log(`Fetch #${n} started`);

  // Cache bust with timestamp
  const bust = Date.now();
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/AMZN?interval=1m&range=1d&_=${bust}`;
  
  const proxies = [
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  ];

  try {
    for (const proxy of proxies) {
      try {
        const start = Date.now();
        const res = await fetch(proxy, {cache: 'no-store', headers: {'Cache-Control': 'no-cache'}});
        const elapsed = Date.now() - start;
        if (!res.ok) { log(`Proxy failed ${res.status}`, 'err'); continue; }
        const json = await res.json();
        const meta = json?.chart?.result?.[0]?.meta;
        const quotes = json?.chart?.result?.[0]?.indicators?.quote?.[0];
        const lastClose = quotes?.close ? quotes.close.filter(x => x != null).pop() : null;
        const fields = {
          regularMarketPrice: meta?.regularMarketPrice,
          chartPreviousClose: meta?.chartPreviousClose,
          previousClose: meta?.previousClose,
          lastOHLCVclose: lastClose,
        };
        log(`Fetch #${n} OK in ${elapsed}ms via ${proxy.split('?')[0]}`, 'ok');
        Object.entries(fields).forEach(([k, v]) => log(`  ${k}: $${v !== undefined ? Number(v).toFixed(2) : 'N/A'}`));
        document.getElementById('price').textContent = `AMZN $${lastClose?.toFixed(2)}`;
        document.getElementById('lastUpdate').textContent = `Updated ${new Date().toLocaleTimeString()} — fetch #${n} (${elapsed}ms)`;
        break;
      } catch(e) {
        log(`Proxy error: ${e.message}`, 'err');
      }
    }
  } finally {
    isFetching = false;
  }
}

// Run immediately then every 5 seconds
fetchAMZN();
setInterval(fetchAMZN, 5000);
</script>
</body>
</html>
